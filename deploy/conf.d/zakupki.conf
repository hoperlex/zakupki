# zakupki — zak.su10.ru (СУ-10 ЭТП). SPA + /api → Fastify, за общим infra-nginx.
# Копируется в /opt/infra/nginx/conf.d/zakupki.conf; затем:
#   docker exec infra-nginx nginx -t && docker exec infra-nginx nginx -s reload
# Динамический резолвинг имён контейнеров (docker DNS) — переживает пересоздание.
server {
    listen 80;
    server_name zak.su10.ru;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name zak.su10.ru;

    ssl_certificate     /etc/letsencrypt/live/zak.su10.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zak.su10.ru/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;

    client_max_body_size 30m;   # API multipart limit = 25 MB (+ headroom)

    resolver 127.0.0.11 valid=30s ipv6=off;
    set $api zakupki-api;
    set $web zakupki-web;

    # API + SSE (потоковый рейтинг заявок) — без буферизации, длинный read timeout.
    location /api/ {
        proxy_pass http://$api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        proxy_cache off;
    }

    # SPA (статика web-контейнера).
    location / {
        proxy_pass http://$web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
    }
}
