# Production stack for zakupki — sits behind the shared infra-nginx on the `edge`
# network (same pattern as estimat/billhub). No published host ports: the app is
# reachable only via infra-nginx inside `edge`.
#
# Do NOT drive this file by hand — use `deploy-zak` (deploy/deploy-zak.sh). It sets
# ZAK_TAG and the ZAK_DEPLOY_* vars the one-off services below depend on, and it is
# the only path that takes the deploy lock, backs up config and rotates releases.
#
# Paths below are relative to this file's dir (deploy/), i.e. they resolve to the
# repo root: ../.env.production and ../certs/yandex-root.crt.
#
# ZAK_TAG is the short commit SHA of the release. `:latest` is a movable alias for
# the last release that passed health — it is not a release of its own.

services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    image: zakupki-api:${ZAK_TAG:-latest}
    container_name: zakupki-api
    restart: unless-stopped
    env_file:
      - ../.env.production
    volumes:
      # Yandex Managed PostgreSQL CA (verify-full). Matches DATABASE_SSL_CA in env.
      - ../certs/yandex-root.crt:/app/certs/yandex-root.crt:ro
      # Uploaded documents (STORAGE_ROOT) — persists across deploys.
      - zakupki-storage:/var/lib/zakupki/storage
    networks: [edge]

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    image: zakupki-web:${ZAK_TAG:-latest}
    container_name: zakupki-web
    restart: unless-stopped
    networks: [edge]

  # ---- One-off services (profile `tools`): never started by `up -d`. ----
  # Both sit on the compose-default network, not `edge`: they only need outbound
  # NAT to the managed database, and have no business seeing infra-nginx or the
  # neighbouring portals. No container_name — `run` must not clash with the
  # long-running services.

  # Migration runner. Same image as api, but without the storage volume: schema
  # changes have no business touching uploaded documents.
  migrate:
    image: zakupki-api:${ZAK_TAG:-latest}
    profiles: ['tools']
    env_file:
      - ../.env.production
    volumes:
      - ../certs/yandex-root.crt:/app/certs/yandex-root.crt:ro
    command: ['pnpm', '--silent', '--filter', '@zakupki/db', 'db:migrate']

  # pg_dump / pg_restore for the pre-migration backup and for --restore-db.
  db-tools:
    image: postgres:17
    profiles: ['tools']
    # MUST be ZAK_DEPLOY_UID/GID, not ${UID}/${GID}: bash has no GID at all and does
    # not export UID, so compose would interpolate `1000:` and docker would refuse.
    # Without this the dumps land root-owned and rotation under the deploy user breaks.
    user: '${ZAK_DEPLOY_UID:-0}:${ZAK_DEPLOY_GID:-0}'
    env_file:
      - ../.env.production
    environment:
      # DATABASE_URL already carries sslmode=verify-full but no sslrootcert, so libpq
      # would look under $HOME — and this container has no /etc/passwd entry for the
      # UID above, so $HOME collapses to / and the dump dies on a missing CA.
      # DATABASE_SSL_CA is no help here: only our loadEnv.ts reads it, never libpq.
      # NB: the app reaches the DB via postgres.js `ssl` object (which ignores the
      # URL's sslmode); pg_dump reaches it via libpq. Two different TLS paths on
      # purpose — do not "unify" them.
      PGSSLROOTCERT: /app/certs/yandex-root.crt
      PGSSLMODE: verify-full
      PGCONNECT_TIMEOUT: '15'
    volumes:
      - ../certs/yandex-root.crt:/app/certs/yandex-root.crt:ro
      - ${ZAK_BACKUP_DIR:-/var/lib/zakupki/deploy/db-backups}:/backups
    command: ['pg_dump', '--version']

volumes:
  zakupki-storage:

networks:
  edge:
    external: true
