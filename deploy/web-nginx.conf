# Internal nginx for the zakupki-web container — serves the SPA only.
# /api is NOT handled here; the shared infra-nginx routes /api → zakupki-api.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets — cache hard.
    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — every other path serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
